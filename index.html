<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="./script.js" defer></script>
    <div id="page">
    <h1 id="title">WELCOME TO THE CALCULATOR!!1!</h1>

    <br>
        <div id="container">
            <div id="calc">
                <div id="screen">
                    <h3 id="display">The result will appear here</h3><br>
                    <h3 id="result"></h3>
                    <br>
                </div>
                <div id="buttons">
                    <button id="clear">CLEAR</button><br>
                    <button id="1" class="input">1</button>
                    <button id="2" class="input">2</button>
                    <button id="3" class="input">3</button><br>
                    <button id="4" class="input">4</button>
                    <button id="5" class="input">5</button>
                    <button id="6" class="input">6</button><br>
                    <button id="7" class="input">7</button>
                    <button id="8" class="input">8</button>
                    <button id="9" class="input">9</button><br>
                    <button id="div" class="input">/</button>
                    <button id="0" class="input">0</button>
                    <button id="sum" class="input">+</button><br>
                    <button id="sub" class="input">-</button>
                    <button id="mult" class="input">*</button>
                    <button id="equal" class="input">=</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
